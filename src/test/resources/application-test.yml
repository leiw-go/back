# 测试自包含配置：禁用 Nacos Config，使用 H2 内存数据库
# 这样 `mvn test` 在没有运行 Nacos 也能加载 Spring context
jwt:
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5vcA==
  expiration: 86400000
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: never
  cloud:
    nacos:
      config:
        # 测试时禁用 Nacos，避免 context 启动卡住
        enabled: false
      discovery:
        # 测试时禁用服务注册，避免心跳握手阻塞 context
        register-enabled: false
        fail-fast: false