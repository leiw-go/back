server:
  port: 8888

spring:
  application:
    name: ProjectInfomationManage
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # Spring Cloud Alibaba 2022+ 需要显式 import Nacos 配置
  # dataId 必须带 file-extension 后缀，因为 file-extension 不会自动拼接到 import 中的 dataId
  config:
    import: "optional:nacos:ProjectInfomationManage-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}"
  # 敏感配置（datasource / jwt / sql.init）由 Nacos 提供；
  # 默认 dataId 约定：${spring.application.name}-${spring.profiles.active}.yaml
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:host.docker.internal:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        # Nacos 暂不可用时仍可启动（dev/CI 友好）
        fail-fast: false
      discovery:
        # 与 config 复用同一组环境变量；Jenkinsfile 仅需在容器 env-file 里写一份
        server-addr: ${NACOS_SERVER_ADDR:host.docker.internal:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        # Dev / 本地默认 register 本实例；test profile 在 application-test.yml 关闭
        register-enabled: ${NACOS_DISCOVERY_REGISTER_ENABLED:true}
        # Nacos 不可达时不阻塞启动，依赖后续重连
        fail-fast: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yaowenltd.projectinfomationmanage.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html