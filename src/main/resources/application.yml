server:
  port: 8888

spring:
  application:
    name: ProjectInfomationManage
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # Spring Cloud Alibaba 2023+ 需要显式 import Nacos 配置
  # dataId 必须带 file-extension 后缀，因为 file-extension 不会自动拼接到 import 中的 dataId
  # ⚠ file-extension 和 server-addr 必须在 base 文件中声明：
  #   spring.config.import 占位符在 profile 文件加载之前就要解析，
  #   否则 Nacos 客户端拿到 http://null/... 的非法 URI 直接启动失败。
  config:
    import: "optional:nacos:ProjectInfomationManage-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}"
  cloud:
    nacos:
      config:
        # 默认连本机 Nacos；profile 文件可覆盖为 prod 的 host.docker.internal
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        # 必须放在 base：被 spring.config.import 占位符引用
        file-extension: yaml
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yaowenltd.projectinfomationmanage.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Actuator 暴露面控制：默认只开 health/info（健康/存活探针），
# 这里额外开 refresh —— 让运维能在不发重启的前提下强制刷新一次 Nacos 配置。
management:
  endpoints:
    web:
      exposure:
        include: refresh,health,info
  endpoint:
    refresh:
      access: read_only     # 默认就是 read_only，显式写出来防止被某个 yaml 关掉
    health:
      access: read_only
  info:
    env:
      enabled: false        # 关掉 info/env（暴露太多默认信息，不小心开可能被人扫描）