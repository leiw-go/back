# akshare 本机部署 compose
#
# 启动方式（在项目根目录）：
#   docker compose -f docker-compose.akshare.yml build
#   docker compose -f docker-compose.akshare.yml up -d
#   curl http://localhost:8000/health
#
# 为什么不和后端 Spring Boot 一起组合并：
#   - Spring Boot 走的是 host.docker.internal 调 Nacos/DB，依赖面更多
#   - 单独一份 compose 文件让你可以独立停止 akshare 而不影响主链路
#   - akshare 这个组合单独 verify 更简单

services:
  akshare-service:
    container_name: akshare-service
    build:
      context: ./akshare-service
      dockerfile: Dockerfile
    image: local/akshare-service:1.0.0

    # ⚠ 端口冲突说明：
    #   宿主机 8000 已被同机的前端容器 (leiw-go/front) 占用；这里改用宿主 18000 → 容器 8000。
    #   改完别忘了同步 application.yml 里的 akshare.service.base-url（也支持环境变量覆盖）。
    ports:
      - "18000:8000"

    # akshare 经常请求东财/新浪/腾讯，初次冷启动 + import pandas 慢
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s   # 第一次启动 pip install 完成后还要 ~30s 收尾

    restart: unless-stopped

    # 让 akshare 容器能访问宿主机的其它服务（如果你之后要让 Java 跑在宿主）
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      # 容器内为 UTC；东财站点对 TZ 不敏感，但保持显式便于排查时间相关 bug
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"

    # 给 akshare 一个略大的 ulimit，第一次大规模抓数时 pandas 分页分配可能短时占用较多 fd
    ulimits:
      nofile:
        soft: 65536
        hard: 65536